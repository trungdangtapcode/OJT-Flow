services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${OJT_POSTGRES_DB:-ojtflow}
      POSTGRES_USER: ${OJT_POSTGRES_USER:-ojtflow}
      POSTGRES_PASSWORD: ${OJT_POSTGRES_PASSWORD:-ojtflow}
    ports:
      - "${OJT_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${OJT_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    environment:
      OJT_STORAGE_BACKEND: postgres
      OJT_DATABASE_URL: postgresql://${OJT_POSTGRES_USER:-ojtflow}:${OJT_POSTGRES_PASSWORD:-ojtflow}@postgres:5432/${OJT_POSTGRES_DB:-ojtflow}
      OJT_REDIS_URL: redis://redis:6379/0
      OJT_DATA_DIR: /app/var
      OJT_KNOWLEDGE_DIR: /app/knowledge
      OJT_MIGRATIONS_DIR: /app/sql/postgres/migrations
      OJT_GOOGLE_CLIENT_ID: ${OJT_GOOGLE_CLIENT_ID:-}
      OJT_GOOGLE_CLIENT_SECRET: ${OJT_GOOGLE_CLIENT_SECRET:-}
      OJT_GOOGLE_REDIRECT_URI: ${OJT_GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      OJT_GOOGLE_FRONTEND_REDIRECT_URI: ${OJT_GOOGLE_FRONTEND_REDIRECT_URI:-http://localhost:5173/auth/callback}
      OJT_ALLOWED_AUTH_REDIRECT_URIS: ${OJT_ALLOWED_AUTH_REDIRECT_URIS:-}
      OJT_ALLOWED_GOOGLE_HOSTED_DOMAINS: ${OJT_ALLOWED_GOOGLE_HOSTED_DOMAINS:-}
      OJT_GOOGLE_OAUTH_TIMEOUT_SECONDS: ${OJT_GOOGLE_OAUTH_TIMEOUT_SECONDS:-10.0}
      OJT_AUTH_SESSION_TTL_SECONDS: ${OJT_AUTH_SESSION_TTL_SECONDS:-604800}
      OJT_AUTH_STATE_TTL_SECONDS: ${OJT_AUTH_STATE_TTL_SECONDS:-600}
      OJT_AUTH_COOKIE_NAME: ${OJT_AUTH_COOKIE_NAME:-ojtflow_session}
      OJT_AUTH_COOKIE_SECURE: ${OJT_AUTH_COOKIE_SECURE:-false}
      OJT_AUTH_COOKIE_SAMESITE: ${OJT_AUTH_COOKIE_SAMESITE:-lax}
      OJT_AUTH_COOKIE_DOMAIN: ${OJT_AUTH_COOKIE_DOMAIN:-}
      OJT_MAX_UPLOAD_BYTES: ${OJT_MAX_UPLOAD_BYTES:-26214400}
      OJT_MAX_INLINE_DATA_BYTES: ${OJT_MAX_INLINE_DATA_BYTES:-1048576}
      OJT_UPLOAD_READ_CHUNK_BYTES: ${OJT_UPLOAD_READ_CHUNK_BYTES:-1048576}
      OJT_ALLOWED_UPLOAD_EXTENSIONS: ${OJT_ALLOWED_UPLOAD_EXTENSIONS:-.pdf,.docx,.xlsx,.xls,.pptx,.png,.jpg,.jpeg,.tiff,.tif,.bmp,.gif,.webp,.html,.htm,.md,.txt,.csv,.json,.yaml,.yml}
      OJT_EMBEDDING_PROVIDER: ${OJT_EMBEDDING_PROVIDER:-deterministic}
      OJT_EMBEDDING_MODEL: ${OJT_EMBEDDING_MODEL:-deterministic-hash-v0}
      OJT_EMBEDDING_DIMENSIONS: ${OJT_EMBEDDING_DIMENSIONS:-64}
    ports:
      - "${OJT_API_PORT:-8000}:8000"
    volumes:
      - app_data:/app/var
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    ports:
      - "${OJT_FRONTEND_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:5173/",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  mcp-structured-data:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "ojtflow.mcp_servers.structured_data_server"]
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "7001"
      OJT_STORAGE_BACKEND: postgres
      OJT_DATA_DIR: /app/var
      OJT_KNOWLEDGE_DIR: /app/knowledge
    ports:
      - "${OJT_MCP_STRUCTURED_DATA_PORT:-7001}:7001"
    volumes:
      - app_data:/app/var
    profiles:
      - mcp

  mcp-schema-validation:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "ojtflow.mcp_servers.schema_validation_server"]
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "7002"
      OJT_STORAGE_BACKEND: postgres
      OJT_DATA_DIR: /app/var
      OJT_KNOWLEDGE_DIR: /app/knowledge
    ports:
      - "${OJT_MCP_SCHEMA_VALIDATION_PORT:-7002}:7002"
    volumes:
      - app_data:/app/var
    profiles:
      - mcp

  mcp-rag-context:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "ojtflow.mcp_servers.rag_context_server"]
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "7003"
      OJT_STORAGE_BACKEND: postgres
      OJT_DATA_DIR: /app/var
      OJT_KNOWLEDGE_DIR: /app/knowledge
    ports:
      - "${OJT_MCP_RAG_CONTEXT_PORT:-7003}:7003"
    volumes:
      - app_data:/app/var
    profiles:
      - mcp

  mcp-workflow-audit:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "ojtflow.mcp_servers.workflow_audit_server"]
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "7004"
      OJT_STORAGE_BACKEND: postgres
      OJT_DATABASE_URL: postgresql://${OJT_POSTGRES_USER:-ojtflow}:${OJT_POSTGRES_PASSWORD:-ojtflow}@postgres:5432/${OJT_POSTGRES_DB:-ojtflow}
      OJT_DATA_DIR: /app/var
    ports:
      - "${OJT_MCP_WORKFLOW_AUDIT_PORT:-7004}:7004"
    volumes:
      - app_data:/app/var
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - mcp

  mcp-human-review:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "ojtflow.mcp_servers.human_review_server"]
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "7005"
      OJT_STORAGE_BACKEND: postgres
      OJT_DATABASE_URL: postgresql://${OJT_POSTGRES_USER:-ojtflow}:${OJT_POSTGRES_PASSWORD:-ojtflow}@postgres:5432/${OJT_POSTGRES_DB:-ojtflow}
      OJT_DATA_DIR: /app/var
    ports:
      - "${OJT_MCP_HUMAN_REVIEW_PORT:-7005}:7005"
    volumes:
      - app_data:/app/var
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - mcp

volumes:
  postgres_data:
  app_data:

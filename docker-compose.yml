      OJT_EMBEDDING_MODEL: ${OJT_EMBEDDING_MODEL:-text-embedding-3-small}
      OJT_EMBEDDING_DIMENSIONS: ${OJT_EMBEDDING_DIMENSIONS:-384}
      OJT_OPENAI_EMBEDDING_BASE_URL: ${OJT_OPENAI_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      OJT_OPENAI_EMBEDDING_TIMEOUT_SECONDS: ${OJT_OPENAI_EMBEDDING_TIMEOUT_SECONDS:-20.0}
      OJT_LLM_PROVIDER: ${OJT_LLM_PROVIDER:-openai}
      OJT_LLM_MODEL: ${OJT_LLM_MODEL:-chat-latest}
      OJT_LLM_PLANNING_MODEL: ${OJT_LLM_PLANNING_MODEL:-}
      OJT_LLM_SYNTHESIS_MODEL: ${OJT_LLM_SYNTHESIS_MODEL:-}
      OJT_LLM_VISION_MODEL: ${OJT_LLM_VISION_MODEL:-${OJT_OPENAI_VISION_MODEL:-}}
      OJT_LLM_BASE_URL: ${OJT_LLM_BASE_URL:-https://api.openai.com/v1}
      OJT_LLM_TIMEOUT_SECONDS: ${OJT_LLM_TIMEOUT_SECONDS:-90.0}
      OJT_LLM_MAX_TOOL_CALLS: ${OJT_LLM_MAX_TOOL_CALLS:-4}
      OJT_EXTERNAL_OPENAI_LLM_ENABLED: ${OJT_EXTERNAL_OPENAI_LLM_ENABLED:-true}
      OJT_EXTERNAL_OPENAI_LLM_ALLOW_PHI: ${OJT_EXTERNAL_OPENAI_LLM_ALLOW_PHI:-false}
      OJT_EXTERNAL_OPENAI_EMBEDDINGS_ENABLED: ${OJT_EXTERNAL_OPENAI_EMBEDDINGS_ENABLED:-true}
      OJT_EXTERNAL_OPENAI_EMBEDDINGS_ALLOW_PHI: ${OJT_EXTERNAL_OPENAI_EMBEDDINGS_ALLOW_PHI:-false}
      OJT_RETRIEVAL_MODE: ${OJT_RETRIEVAL_MODE:-semantic_vector}
      OJT_RETRIEVAL_FRAMEWORK: ${OJT_RETRIEVAL_FRAMEWORK:-custom}
      OJT_SENTRY_DSN: ${OJT_SENTRY_DSN:-}
    volumes:
      - app_data:/app/var
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    command: >
      celery --broker=amqp://${OJT_RABBITMQ_USER:-ojtflow}:${OJT_RABBITMQ_PASSWORD:-ojtflow}@rabbitmq:5672// flower
      --port=5555
    environment:
      FLOWER_UNAUTHENTICATED_API: ${OJT_FLOWER_UNAUTHENTICATED_API:-true}
    ports:
      - "${OJT_FLOWER_PORT:-15555}:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    environment:
      RABBIT_URL: http://rabbitmq:15672
      RABBIT_USER: ${OJT_RABBITMQ_USER:-ojtflow}
      RABBIT_PASSWORD: ${OJT_RABBITMQ_PASSWORD:-ojtflow}
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery-exporter:
    image: danihodovic/celery-exporter:0.10.12
    command:
      - --broker-url=amqp://${OJT_RABBITMQ_USER:-ojtflow}:${OJT_RABBITMQ_PASSWORD:-ojtflow}@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${OJT_PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
      rabbitmq-exporter:
        condition: service_started
      celery-exporter:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${OJT_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${OJT_GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${OJT_GRAFANA_PORT:-13000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    profiles: ["medsiglip"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${OJT_DCGM_EXPORTER_PORT:-19400}:9400"

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "${OJT_LOKI_PORT:-13100}:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    ports:
      - "${OJT_FRONTEND_PORT:-15173}:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:5173/",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
  app_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:

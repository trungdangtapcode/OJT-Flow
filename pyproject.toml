[project]
name = "ojtflow"
version = "0.1.0"
description = "Governed healthcare data workflow scaffold for OJTFlow"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.111,<1",
  "pydantic>=2.7,<3",
  "psycopg[binary]>=3.2,<4",
  "pyyaml>=6,<7",
  "uvicorn[standard]>=0.29,<1"
]

[project.optional-dependencies]
dev = [
  "httpx",
  "pytest"
]
parsing = [
  "markitdown[docx,xlsx,pptx]>=0.1.0",
  "python-multipart>=0.0.9",
]
parsing-full = [
  "markitdown[docx,xlsx,pptx]>=0.1.0",
  "magic-pdf[full]>=0.11.0",
  "python-multipart>=0.0.9",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py312"

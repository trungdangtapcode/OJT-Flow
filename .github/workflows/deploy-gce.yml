name: deploy

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Docker Compose stack to GCE
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Copy source to instance
        run: |
          tar \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='node_modules' \
            --exclude='var' \
            --exclude='plan' \
            --exclude='todo.txt' \
            --exclude='image.png' \
            --exclude='imge*.png' \
            -czf /tmp/ojtflow-deploy.tgz .
          gcloud compute scp /tmp/ojtflow-deploy.tgz "${{ secrets.GCE_INSTANCE }}:ojtflow-deploy-${{ github.run_id }}.tgz" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --zone "${{ secrets.GCE_ZONE }}"
          gcloud compute ssh "${{ secrets.GCE_INSTANCE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --command "sudo mkdir -p /opt/ojtflow && sudo tar --no-same-owner -xzf ~/ojtflow-deploy-${{ github.run_id }}.tgz -C /opt/ojtflow && rm -f ~/ojtflow-deploy-${{ github.run_id }}.tgz && sudo chown -R \$(id -un):\$(id -gn) /opt/ojtflow"

      - name: Deploy stack
        run: |
          gcloud compute ssh "${{ secrets.GCE_INSTANCE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --command "cd /opt/ojtflow && sudo docker compose up -d --build --remove-orphans"

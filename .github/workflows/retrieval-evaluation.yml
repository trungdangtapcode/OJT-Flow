name: Retrieval Evaluation

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  retrieval-evaluation:
    name: Nightly retrieval benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt --build-constraint constraints.txt ".[dev,parsing]"

      - name: Run retrieval benchmark
        env:
          PYTHONPATH: src
        run: |
          python scripts/evaluate-retrieval.py --json > retrieval-evaluation-summary.json
          python scripts/evaluate-retrieval.py

      - name: Upload retrieval benchmark summary
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-evaluation-summary
          path: retrieval-evaluation-summary.json
          if-no-files-found: error

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - deploy
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt --build-constraint constraints.txt ".[dev,parsing]"

      - name: Run backend tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
        run: python -m pytest

      - name: Check Postgres migration manifest
        env:
          PYTHONPATH: src
        run: python scripts/check-migrations.py

      - name: Check repo hygiene
        run: git diff --check

      - name: Scan logs for raw PHI
        env:
          PYTHONPATH: src
        run: python scripts/scan-no-raw-phi.py --self-test --allow-missing

      - name: Run retrieval evaluation fixture
        env:
          PYTHONPATH: src
        run: python scripts/evaluate-retrieval.py

      - name: Run Graph-NER evaluation fixture
        env:
          PYTHONPATH: src
        run: python scripts/evaluate-graph-ner.py

      - name: Run performance smoke
        env:
          OJT_STORAGE_BACKEND: memory
          PYTHONPATH: src
        run: python scripts/performance-smoke.py --mode asgi --json

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build --build-arg OJT_PYTHON_EXTRAS=parsing -t ojtflow-api:ci .

      - name: Build frontend image
        run: docker build -t ojtflow-frontend:ci ./frontend

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start Docker stack
        env:
          OJT_PYTHON_EXTRAS: parsing
        run: docker compose up -d --build

      - name: Run Playwright smoke
        working-directory: frontend
        env:
          OJT_E2E_BASE_URL: http://127.0.0.1:5173
        run: npm run e2e:smoke

      - name: Cleanup Playwright artifacts
        if: always()
        working-directory: frontend
        run: |
          npm run e2e:cleanup || true
          npm run e2e:cleanup:local || true

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v

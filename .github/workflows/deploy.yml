name: deploy

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: deploy-gce
  cancel-in-progress: false

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint constraints.txt --build-constraint constraints.txt ".[dev,parsing]"

      - name: Run backend tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: src
        run: python -m pytest

      - name: Run retrieval evaluation fixture
        env:
          PYTHONPATH: src
        run: python scripts/evaluate-retrieval.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build --build-arg OJT_PYTHON_EXTRAS=parsing -t ojtflow-api:ci .

      - name: Build frontend image
        run: docker build -t ojtflow-frontend:ci ./frontend

  deploy:
    name: Deploy Docker Compose stack to GCE
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://35.223.66.36:5173
    needs:
      - backend
      - frontend
      - docker
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Copy source to instance
        run: |
          tar \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='node_modules' \
            --exclude='var' \
            --exclude='plan' \
            --exclude='todo.txt' \
            --exclude='image.png' \
            --exclude='imge*.png' \
            -czf /tmp/ojtflow-deploy.tgz .
          gcloud compute scp /tmp/ojtflow-deploy.tgz "${{ secrets.GCE_INSTANCE }}:ojtflow-deploy-${{ github.run_id }}.tgz" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --zone "${{ secrets.GCE_ZONE }}"
          gcloud compute ssh "${{ secrets.GCE_INSTANCE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --command "sudo mkdir -p /opt/ojtflow && sudo tar --no-same-owner -xzf ~/ojtflow-deploy-${{ github.run_id }}.tgz -C /opt/ojtflow && rm -f ~/ojtflow-deploy-${{ github.run_id }}.tgz && sudo chown -R \$(id -un):\$(id -gn) /opt/ojtflow"

      - name: Deploy stack
        run: |
          gcloud compute ssh "${{ secrets.GCE_INSTANCE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --command "cd /opt/ojtflow && sudo docker compose up -d --build --remove-orphans"

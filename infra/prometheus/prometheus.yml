global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ojtflow-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq-exporter:9419"]

  - job_name: celery
    static_configs:
      - targets: ["celery-exporter:9808"]

  - job_name: medsiglip
    metrics_path: /metrics
    static_configs:
      - targets: ["medsiglip:8000"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: nvidia-dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
